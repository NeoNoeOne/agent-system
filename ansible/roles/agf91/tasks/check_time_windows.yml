- name: AGF91 | Get current local time (zero-padded)
  ansible.builtin.set_fact:
    now_time: "{{ '%02d:%02d' | format(ansible_date_time.hour | int, ansible_date_time.minute | int) }}"
    now_day: "{{ ansible_date_time.weekday | lower }}"

# DEV OVERRIDE: allow all when allowed_windows is empty
- name: AGF91 | Allow all when no time windows defined
  ansible.builtin.assert:
    that:
      - time_windows_policy.allowed_windows | length > 0
  failed_when: false
  changed_when: false

- name: AGF91 | Check allowed execution window
  ansible.builtin.assert:
    that:
      - >
        time_windows_policy.allowed_windows | selectattr(
          'days', 'contains', now_day
        ) | selectattr(
          'start', 'le', now_time
        ) | selectattr(
          'end', 'ge', now_time
        ) | list | length > 0
    fail_msg: "[AGF91] REJECTED: Outside allowed execution window"
  when: time_windows_policy.allowed_windows | length > 0
